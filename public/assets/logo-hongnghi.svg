<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#F0257E"/>
      <stop offset="1" stop-color="#7A0F44"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#F7DD9A"/>
      <stop offset="0.5" stop-color="#D9A93A"/>
      <stop offset="1" stop-color="#B8860B"/>
    </linearGradient>
  </defs>
  <rect x="2" y="2" width="96" height="96" rx="22" fill="url(#bg)"/>
  <!-- stacked MDF boards -->
  <g>
    <rect x="18" y="70" width="64" height="9" rx="2.5" fill="#5E0D34"/>
    <rect x="18" y="69" width="64" height="3" rx="1.5" fill="#8A1550"/>
    <rect x="24" y="62" width="52" height="8" rx="2.5" fill="#9C1556"/>
    <rect x="24" y="61" width="52" height="3" rx="1.5" fill="#C71E6E"/>
    <rect x="30" y="55" width="40" height="7" rx="2.5" fill="#E91E78"/>
    <rect x="30" y="54" width="40" height="2.5" rx="1.5" fill="#FF4D9E"/>
  </g>
  <!-- HN monogram -->
  <text x="50" y="46" text-anchor="middle" font-family="Georgia,'Times New Roman',serif" font-weight="700" font-size="40" fill="url(#gold)">HN</text>
  <!-- MDF -->
  <text x="50" y="77" text-anchor="middle" font-family="Arial,Helvetica,sans-serif" font-weight="700" font-size="10" letter-spacing="2.5" fill="#FBC7DD">MDF</text>
</svg>
